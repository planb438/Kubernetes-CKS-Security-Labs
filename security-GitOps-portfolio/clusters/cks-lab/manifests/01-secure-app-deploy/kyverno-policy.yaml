apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: high
    cks.exercise: "01-secure-app-deploy"
spec:
  validationFailureAction: enforce
  background: true
  rules:
  - name: no-privileged-containers
    match:
      resources:
        kinds:
        - Pod
        namespaces:
        - cks-secure-app
    validate:
      message: "Privileged containers are not allowed per CKS security policy"
      pattern:
        spec:
          containers:
          - =(securityContext):
              =(privileged): "false"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-seccomp-profile
  annotations:
    cks.exercise: "01-secure-app-deploy"
spec:
  validationFailureAction: audit  # Start with audit, then enforce
  rules:
  - name: check-seccomp
    match:
      resources:
        kinds:
        - Pod
    validate:
      message: "Seccomp profile must be set to RuntimeDefault or Localhost"
      pattern:
        spec:
          securityContext:
            seccompProfile:
              type: RuntimeDefault

---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-namespace-labels
  annotations:
    policies.kyverno.io/title: Require Namespace Labels
    policies.kyverno.io/severity: low
spec:
  validationFailureAction: Enforce
  rules:
  - name: require-labels
    match:
      resources:
        kinds:
        - Namespace
    validate:
      message: "All namespaces must have an 'owner' label."
      pattern:
        metadata:
          labels:
            owner: "?*"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    policies.kyverno.io/title: Disallow Latest Image Tag
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: require-image-tag
    match:
      resources:
        kinds:
        - Pod
    validate:
      message: "Using 'latest' image tag is not allowed. Use a specific version."
      pattern:
        spec:
          containers:
          - image: "*:*"
          - image: "!*:latest"

---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-readonly-rootfs
  annotations:
    policies.kyverno.io/title: Require Read-Only Root Filesystem
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: check-rootfs
    match:
      resources:
        kinds:
        - Pod
    validate:
      message: "Containers must have read-only root filesystem."
      pattern:
        spec:
          containers:
          - securityContext:
              readOnlyRootFilesystem: true
            
